name: TaskFlow CI-CD

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------
      # ✅ BUILD BACKEND IMAGE
      # -----------------------

      - name: 🏗️ Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend \
          -f Dockerfile.backend .

      # -----------------------
      # ✅ CREATE DOCKER NETWORK
      # -----------------------

      - name: 🌐 Create Smoke Test Network
        run: |
          docker network create smoke-network

      # -----------------------
      # ✅ START POSTGRES
      # -----------------------

      - name: 🐘 Run Postgres for Smoke Test
        run: |
          docker run -d \
            --name smoke-postgres \
            --network smoke-network \
            -e POSTGRES_DB=taskflow \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:16-alpine

          sleep 5

      # -----------------------
      # ✅ START BACKEND
      # -----------------------

      - name: 🚬 Smoke Run Backend Container
        run: |
          docker run -d \
            --name smoke-backend \
            --network smoke-network \
            -e DATABASE_URL=postgresql+psycopg2://postgres:postgres@smoke-postgres:5432/taskflow \
            -p 8000:8000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend

          sleep 10

      # -----------------------
      # ✅ HEALTH CHECK
      # -----------------------

      - name: ❤️ Check Backend Health
        run: |
          curl --fail http://localhost:8000/health

      # -----------------------
      # ✅ CLEANUP
      # -----------------------

      - name: 🧹 Cleanup Smoke Containers
        run: |
          docker rm -f smoke-backend
          docker rm -f smoke-postgres
          docker network rm smoke-network

      # -----------------------
      # ✅ BUILD FRONTEND
      # -----------------------

      - name: 🏗️ Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend \
          -f Dockerfile.frontend .

      # -----------------------
      # ✅ PUSH IMAGES
      # -----------------------

      - name: 🚀 Push Backend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend

      - name: 🚀 Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend