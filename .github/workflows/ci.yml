name: TaskFlow CI-CD

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend \
          -f Dockerfile.backend .

      - name: 🚬 Smoke Run Backend Container
        run: |
          docker run -d -p 8000:8000 \
          --name smoke-backend \
          ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend

          sleep 5

          curl --fail http://localhost:8000/health

      - name: 🧹 Stop Container
        run: docker rm -f smoke-backend

      - name: 🏗️ Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend \
          -f Dockerfile.frontend .

      - name: 🚀 Push Backend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend

      - name: 🚀 Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend