name: TaskFlow CI-CD

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend \
          -f Dockerfile.backend .

      - name: 🐘 Run Postgres for Smoke Test
        run: |
          docker run -d \
            --name smoke-postgres \
            -e POSTGRES_DB=taskflow \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -p 5432:5432 \
            postgres:16-alpine

          sleep 5

      - name: 🚬 Smoke Run Backend Container
        run: |
          docker run -d \
            --name smoke-backend \
            -e DATABASE_URL=postgresql+psycopg2://postgres:postgres@host.docker.internal:5432/taskflow \
            -p 8000:8000 \
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend

          sleep 8

      - name: 🌐 Check Backend Health
        run: |
          curl --fail http://localhost:8000/health

      - name: 🧹 Stop Container
        run:  |
          docker rm -f smoke-backend
          docker rm -f smoke-postgres


      - name: 🏗️ Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend \
          -f Dockerfile.frontend .

      - name: 🚀 Push Backend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-backend

      - name: 🚀 Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend